<template>
    <lightning-card title="AI Case Viewer">
        <div class="slds-p-around_medium">
            <lightning-button
                label="Generate AI Response"
                variant="brand"
                onclick={handleGenerate}
                disabled={loading}>
            </lightning-button>

            <template if:true={loading}>
                <p class="slds-m-top_small">Generating response...</p>
            </template>

            <template if:true={errorMessage}>
                <p class="slds-text-color_error slds-m-top_small">{errorMessage}</p>
            </template>

            <template if:true={response}>
                <p class="slds-m-top_medium"><strong>AI Response:</strong> {response}</p>
            </template>

            <template if:true={priority}>
                <p class="slds-m-top_small"><strong>Priority:</strong> {priority}</p>
            </template>

            <template if:true={processed}>
                <p class="slds-m-top_small"><strong>Processed:</strong> {processed}</p>
            </template>

            <template if:true={summary}>
                <p class="slds-m-top_small"><strong>Customer Summary:</strong> {summary}</p>
            </template>
        </div>
    </lightning-card>
</template>
